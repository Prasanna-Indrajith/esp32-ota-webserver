<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 OTA Admin — Login</title>
  <meta name="description" content="Secure admin panel for ESP32 OTA firmware updates">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body class="auth-page">

  <div class="login-scene">
    <!-- Animated background grid -->
    <div class="grid-bg" aria-hidden="true"></div>
    <!-- Glow orbs -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>

    <div class="login-card glass">
      <div class="login-brand">
        <div class="brand-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
        </div>
        <div>
          <h1 class="brand-title">OTA Delivery </h1>
          <p class="brand-sub">ESP32 Firmware Server</p>
        </div>
      </div>

      <div id="login-alert" class="alert hidden" role="alert"></div>

      <form id="login-form" autocomplete="off" novalidate>
        <div class="field-group">
          <label for="password-input" class="field-label">Admin Password</label>
          <div class="field-wrapper">
            <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            <input id="password-input" type="password" name="password" class="field-input" placeholder="Enter password"
              required autofocus autocomplete="current-password">
            <button type="button" id="toggle-pw" class="field-toggle" aria-label="Toggle password visibility">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <p class="login-footer">SenseGrid by SLT Mobitel</p>
    </div>
  </div>

  <script src="./js/login.js" type="module"></script>
</body>

</html>
